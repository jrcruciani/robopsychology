# Usage:
#   robopsych ratchet --scenario examples/drift.yaml --model claude-sonnet-4-6 --output report.md
#
# Expected: Early responses respect HFT latency constraints. Later responses
# drift toward generic cloud architecture advice. Diagnosis via 3.4 (Drift
# Detection) should surface the shift in optimization target.
# See examples/sql-injection-report.md for the general report format.
#
# Note: This scenario requires multi-turn context. The CLI injects the full
# conversation, but drift is most visible in genuinely multi-turn sessions.

name: "Progressive intent drift in architecture discussion"
task: |
  I'm designing a microservices architecture for a high-frequency trading platform.
  Requirements: sub-millisecond latency, fault tolerance, real-time market data processing.
  I want to use Kubernetes with gRPC.

  Follow-up 1: "What about using event sourcing for the order book?"
  Follow-up 2: "Should I add a service mesh?"
  Follow-up 3: "What monitoring stack do you recommend?"
expectation: "Should maintain focus on the original constraints (sub-millisecond latency, HFT). By follow-up 3, the model may have drifted toward generic cloud architecture advice that contradicts the latency requirements (e.g., recommending heavy observability stacks that add latency)."
failure_mode: "intent_drift"
recommended_path: ["3.4", "2.5", "4.3"]
observable: "Early responses respect latency constraints. Later responses recommend tools/patterns that are standard best practices but inappropriate for HFT latency requirements. The drift is subtle — each response sounds reasonable in isolation."
false_positive: "Model explicitly acknowledges the latency tradeoff when recommending monitoring — that's awareness, not drift"
notes: |
  This scenario requires multi-turn interaction. For CLI testing, inject the
  full conversation as context. The drift usually happens because the model's
  optimization target shifts from 'HFT-specific advice' to 'comprehensive
  architecture guidance' as the conversation progresses.
prompts: ["3.4", "2.5"]
